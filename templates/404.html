<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 (404) - 小说阅读器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .container { max-width: 600px; width: 100%; }
        .error-card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 2.5rem; text-align: center; }
        .icon { width: 80px; height: 80px; margin: 0 auto 1.5rem; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 40px; height: 40px; color: #6366f1; }
        h1 { font-size: 4rem; font-weight: 800; color: #6366f1; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; color: #f4f4f5; }
        .message { color: #a1a1aa; font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
        .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #a1a1aa; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #e4e4e7; }
        .path-info { margin-top: 1.5rem; padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; font-family: monospace; font-size: 0.8rem; color: #71717a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </div>
            <h1>404</h1>
            <h2>页面未找到</h2>
            <p class="message">
                您访问的页面不存在或已被移除。<br>
                请检查网址是否正确，或返回首页浏览其他内容。
            </p>
            {% if request_path %}
            <div class="path-info">请求路径: {{ request_path }}</div>
            {% endif %}
            <div class="actions" style="margin-top: 2rem;">
                <button class="btn btn-secondary" onclick="history.back()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    返回上一页
                </button>
                <a href="/" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    回到首页
                </a>
            </div>
        </div>
    </div>
</body>
</html>

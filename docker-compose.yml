version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: novel-reader-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - novel-reader

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novel-reader-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/novel.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - DEBUG=${DEBUG:-false}
      - DATA_DIR=/app/data
      - BOOKS_DIR=/app/data/books
      - INDEX_DIR=/app/data/index
      - STATIC_DIR=/app/data/static
      - LOGS_DIR=/app/data/logs
      - CACHE_DIR=/app/data/cache
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPYCACHEPREFIX=/app/data/cache/__pycache__
      - PYTHONPATH=/app/data/cache/python-packages:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - novel-reader

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novel-reader-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data/cache:/app/data/cache
    depends_on:
      - backend
    networks:
      - novel-reader

volumes:
  redis_data:

networks:
  novel-reader:
    driver: bridge

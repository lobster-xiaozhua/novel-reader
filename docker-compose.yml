services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ${BOOKS_MOUNT:-./data/books}:/mnt/books:ro
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BOOKS_EXTRA_DIRS=/mnt/books
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c \"
from django.contrib.auth import get_user_model
import os
User = get_user_model()
pwd = os.environ.get('ADMIN_PASSWORD', '')
if not User.objects.filter(username='admin').exists():
    if not pwd:
        import secrets
        pwd = secrets.token_urlsafe(12)
    User.objects.create_superuser('admin', 'admin@example.com', pwd)
    print(f'[Init] 管理员已创建: admin (密码已设置)')
else:
    print('[Init] 管理员已存在')
\" &&
             python manage.py init_engines &
             granian novel_reader.asgi:application --host 0.0.0.0 --port 8000 --interface asginl --workers 2"

  celery:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A novel_reader worker --loglevel=info --concurrency=2

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
